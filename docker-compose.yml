# =============================================================================
# Rhose Learning Platform — Local Development Stack
# =============================================================================
# Usage:
#   docker compose up -d        Start all services in background
#   docker compose down         Stop all services
#   docker compose down -v      Stop and remove volumes (reset DB)
#   docker compose logs -f db   Follow PostgreSQL logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: rhose-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rhose
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rhose"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
